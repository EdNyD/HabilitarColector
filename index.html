<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
  <!-- Ciberseguridad: CSP Estricto -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' https://script.google.com https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:;">
  
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Portal Académico" />
  
  <title>Acceso Seguro — Universidad de El Salvador</title>
  
  <!-- Manifest e Ícono Vectorial -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  
  <!-- Tipografía Premium: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

  <style>
    :root {
      --bg-deep: #0f172a; 
      --bg-card: #1e293b; 
      --text-main: #f8fafc; 
      --text-muted: #94a3b8; 
      --primary-brand: #3b82f6;
      --radius: 20px; /* Directriz: Esquinas muy redondeadas */
    }
    
    body {
      background-color: var(--bg-deep);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .icon-container {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.5rem auto;
    }

    .btn-premium {
      background: linear-gradient(135deg, var(--primary-brand), #2563eb);
      border: none;
      border-radius: 16px;
      padding: 0.9rem;
      font-weight: 600;
      color: white;
      width: 100%;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-premium:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
      color: white;
    }

    /* Toast Flotante Premium */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1055;
    }
    .toast-custom {
      background: #1e293b;
      color: white;
      border-left: 4px solid var(--primary-brand);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <!-- Contenedor de Alertas Toast (Reemplaza los alert() nativos) -->
  <div class="toast-container">
    <div id="statusToast" class="toast toast-custom align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body fw-medium" id="toastMessage">
          <!-- Mensaje dinámico -->
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  </div>

  <div class="glass-card text-center">
    <div class="icon-container">
      <img src="icon.svg" alt="Logo Institucional" width="100%" height="100%">
    </div>
    <h2 class="fw-bold mb-1 fs-4">Portal FCE-UES</h2>
    <p class="text-muted small mb-4 fw-medium">Gestión Académica y Modificaciones</p>

    <!-- Botón de Instalación (Oculto por defecto) -->
    <button id="btn-install" class="btn btn-dark w-100 mb-3" style="display: none; border-radius: 16px;">
      ⬇️ Instalar App en el Dispositivo
    </button>

    <!-- Botón de Conexión Segura -->
    <button id="btn-connect" class="btn-premium">
      <span id="btn-text">Ingresar con Google Workspace</span>
      <span id="btn-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  
  <script>
    // ⚠️ REEMPLAZA ESTO CON TU URL DE GOOGLE APPS SCRIPT
    const APPS_SCRIPT_URL = "https://script.google.com/a/macros/ues.edu.sv/s/AKfycbyNvXXrW7nQy7ajhJZCdF6KEqanQVh95OlpT87RLzYU489SJlTo4HF6TZ8kah4sdjpDVg/exec";
    
    // Inicializar Toast
    const toastEl = document.getElementById('statusToast');
    const toast = new bootstrap.Toast(toastEl, { delay: 4000 });

    function showToast(message) {
      document.getElementById('toastMessage').textContent = message;
      toast.show();
    }

    // Flujo de conexión con efecto de carga
    document.getElementById('btn-connect').addEventListener('click', function() {
      // Directriz: Inmediatez visual
      this.setAttribute('disabled', 'true');
      document.getElementById('btn-text').textContent = 'Validando credenciales...';
      document.getElementById('btn-spinner').classList.remove('d-none');
      
      showToast('Estableciendo túnel seguro con Google Apps Script...');

      // Redirección tras un breve delay visual
      setTimeout(() => {
        window.location.href = APPS_SCRIPT_URL;
      }, 1500);
    });

    // PWA Logic
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('btn-install').style.display = 'block';
    });

    document.getElementById('btn-install').addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          document.getElementById('btn-install').style.display = 'none';
          showToast('✅ Aplicación instalada correctamente.');
        }
        deferredPrompt = null;
      }
    });

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('Service Worker Activo'))
        .catch(err => console.error('Fallo en SW:', err));
    }
  </script>
</body>
</html>
